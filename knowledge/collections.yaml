# Knowledge Base Collections
# Maps R2R collections to agents that can access them.
# Use `python -m shared.ingest --all` to ingest all collections.

collections:
  example-docs:
    description: "Example documents for testing the framework"
    books_dir: books/example/
    agents:
      - example-agent
      - rag-test
      - scoped-tools-demo
  procurement-policy-core:
    description: "Example procurement policies, thresholds, sourcing rules, and approval guidance"
    books_dir: books/procurement-policy-core/
    agents:
      - procurement-compliance-officer
  procurement-vendor-risk:
    description: "Example vendor risk, sanctions, privacy, and onboarding guidance"
    books_dir: books/procurement-vendor-risk/
    agents:
      - procurement-compliance-officer
