      - AGENT_NAME=rag-test
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-openrouter/anthropic/claude-sonnet-4}
      - R2R_BASE_URL=http://r2r:7272
      - KNOWLEDGE_MCP_URL=http://knowledge-mcp:9090/mcp
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=agent-tasks
      - REDIS_URL=redis://:${REDIS_AUTH:-myredissecret}@redis:6379
      - API_BEARER_TOKEN=${API_BEARER_TOKEN:-dev-token-change-me}
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
